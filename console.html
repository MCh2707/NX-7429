<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYS_CONSOLE // OVERRIDE</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/console.css" />
  </head>
  <body>
    <div class="crt-container" id="screen">
      <div class="cli-container">
        <div id="console-output">
          <div class="sys-msg screen-tear">
            NEXUS RECOVERY CONSOLE v1.0 [CRITICAL FAILURE]<br />
            Type 'help' for available commands.
          </div>
        </div>
        <div class="input-line">
          <span class="prompt-symbol">root@nexus:~$</span>
          <input
            type="text"
            id="cli-input"
            autocomplete="off"
            spellcheck="false"
            autofocus
          />
        </div>
      </div>
    </div>

    <script src="system.js"></script>
    <script src="js/console.js"></script>
  </body>
</html>
