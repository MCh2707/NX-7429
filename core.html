<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORE // CRITICAL</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="core-bg">
  <div class="container" style="text-align: center; margin-top: 5rem;">
    <h1 class="glitch" data-text="CORE REINITIALIZATION">CORE REINITIALIZATION</h1>
    <p>WARNING: CONTAINMENT PROTOCOLS FAILING.</p>

    <div id="countdown">04:59</div>

    <div id="input-section" style="margin-top: 3rem;">
      <p>PERMANENT SYSTEM TERMINATION REQUIRES THE FOLLOWING COMMAND: ACTIVATE</p>
      <input type="text" id="shutdown-code" autocomplete="off" autofocus
        style="text-align: center; letter-spacing: 5px; text-transform: uppercase;">
      <br><br>
      <button id="btn-submit">EXECUTE</button>
    </div>

    <div id="ending-sequence" class="hidden" style="margin-top: 3rem;">

    </div>
  </div>

  <!-- Redesigned Anomaly Terminal Modal -->
  <div id="activation-window"
    style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 780px; max-width: 95%; background: var(--surface); border: 2px solid var(--err); box-shadow: 0 0 45px rgba(168, 50, 50, 0.45); z-index: 100; padding: 40px; font-family: var(--mono);">
    <div
      style="background: var(--titlebar); color: var(--err); padding: 10px 15px; font-weight: bold; margin: -40px -40px 40px -40px; display: flex; justify-content: space-between; font-size: 1.15rem; letter-spacing: 2px; border-bottom: 1px solid var(--err);">
      <span>SYS_MESSAGE // ANOMALY DETECTED</span>
      <span>[x]</span>
    </div>
    <div id="act-text-1" style="font-size: 1.7rem; line-height: 1.8; margin-bottom: 30px; color: var(--text-hi);"></div>
    <div id="act-text-2" class="glitch" data-text=""
      style="font-size: 3.2rem; color: var(--err); text-align: center; margin-bottom: 30px; font-weight: bold; text-shadow: 0 0 15px rgba(168, 50, 50, 0.35);">
    </div>
    <div id="act-text-3" style="font-size: 1.6rem; line-height: 1.8; color: var(--text-dim); text-align: center;"></div>
  </div>

  <!-- Blackout screen -->
  <div id="blackout-screen" class="blackout">
    <h1 id="final-message" class="glitch" data-text=""
      style="color: var(--term-white); font-size: 2rem; text-align: center; text-shadow: none;"></h1>
  </div>

  <script src="system.js"></script>
  <script src="js/core.js"></script>
</body>

</html>
