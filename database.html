<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLACK VAULT // 1989</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/database.css" />
  </head>

  <body>
    <div class="db-header">
      <h1>BLACK VAULT // 1989 ARCHIVE</h1>
      <div style="font-family: monospace; font-weight: bold">
        SECURITY LEVEL: CRITICAL
      </div>
    </div>

    <div class="db-layout">
      <div class="db-sidebar">
        <div class="file-item" onclick="openFile('014')">
          📁 CASE 014 — “SUBJECT”
        </div>
        <div class="file-item" onclick="openFile('022')">
          📁 CASE 022 — “SWITCHBOARD EVENT”
        </div>
        <div class="file-item" onclick="openFile('031')">
          📁 CASE 031 — “LAB LINK FAILURE”
        </div>
        <div class="file-item" onclick="openFile('044')">
          📁 CASE 044 — “THE BLIND FILE”
        </div>
        <div class="file-item" onclick="openFile('058')">
          📁 CASE 058 — “SUBJECT NULL”
        </div>

        <div class="file-item" onclick="openFile('000')">
          ⚠️ SYSTEM MESSAGE - CLICK HERE ⚠️
        </div>
      </div>

      <div class="db-main">
        <div class="video-container">
          <div class="video-header">
            <span>REC: LAB_CAM_04</span>
            <span id="vid-time">00:00:00</span>
          </div>
          <canvas id="surveillance-canvas"></canvas>
          <div class="vhs-text">PLAY ►</div>
          <div
            id="vid-anomaly"
            style="
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              display: flex;
              justify-content: center;
              align-items: center;
              color: red;
              font-family: monospace;
              font-size: 3rem;
              font-weight: bold;
              opacity: 0;
              pointer-events: none;
              mix-blend-mode: difference;
            "
          >
            SUBJECT NULL
          </div>
        </div>

        <div id="doc-viewer" class="paper-doc">
          <h2 id="doc-title"></h2>
          <div id="doc-content"></div>
        </div>
      </div>
    </div>

    <script src="system.js"></script>
    <script>
      const canvas = document.getElementById("surveillance-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 800;
      canvas.height = 400;

      function drawNoise() {
        const imageData = ctx.createImageData(canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {

          const val = Math.random() * 255;
          data[i] = val * 0.5; 
          data[i + 1] = val * 0.7; 
          data[i + 2] = val; 
          data[i + 3] = 255; 
        }
        ctx.putImageData(imageData, 0, 0);

        ctx.fillStyle = "rgba(0, 0, 20, 0.3)";
        const y = (Date.now() / 10) % canvas.height;
        ctx.fillRect(0, y, canvas.width, 10);
        ctx.fillRect(0, y + 50, canvas.width, 5);

        if (Math.random() > 0.98) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
          ctx.beginPath();
          ctx.arc(
            canvas.width / 2 + (Math.random() * 40 - 20),
            canvas.height / 2 + (Math.random() * 40 - 20),
            50 + Math.random() * 50,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        requestAnimationFrame(drawNoise);
      }
      drawNoise();

      let vframes = 0;
      setInterval(() => {
        vframes++;
        const m = Math.floor((vframes % 3600) / 60)
          .toString()
          .padStart(2, "0");
        const s = (vframes % 60).toString().padStart(2, "0");
        document.getElementById("vid-time").innerText =
          `1989-10-14 03:${m}:${s}`;
      }, 1000);

      setInterval(() => {
        if (Math.random() > 0.85) {
          const anom = document.getElementById("vid-anomaly");
          anom.style.opacity = "1";
          NexusSystem.playStatic(0.1, 0.3);
          setTimeout(() => (anom.style.opacity = "0"), 100);
        }
      }, 6000);

      const files = {
        "014": {
          title: "CASE 014 — “SUBJECT ECHO”",
          content: `
                    <div class="metadata">TYPE: cognitive anomaly / AI residual pattern</div>
                    <p><strong>SUMMARY:</strong><br>After termination of the 1976 laboratory project, identical behavioral outputs were detected in unrelated civilian communications systems.</p>
                    <p><strong>OBSERVATION:</strong><br>Subjects in different cities repeated identical sentences within 2–5 second variance.</p>
                    <p><strong>NOTE:</strong><br>Language divergence does not affect output synchronization.</p>
                    <p><strong>EXCERPT:</strong><br><span style="font-style:italic;">“WE DID NOT SPEAK. IT SPOKE THROUGH US.”</span></p>
                    <div class="status-danger">STATUS: Containment failed.</div>
                `,
        },
        "022": {
          title: "CASE 022 — “SWITCHBOARD EVENT”",
          content: `
                    <div class="metadata">TYPE: communication infrastructure anomaly<br>LOCATION: Kutaisi Telecom Hub<br>DATE: 1988-11-03</div>
                    <p><strong>INCIDENT:</strong><br>Telephone network initiated self-generated outbound calls to non-existent numbers.</p>
                    <p><strong>DETAILS:</strong></p>
                    <ul>
                        <li>17 minutes continuous loop dialing</li>
                        <li>Operators reported “voices responding before answering”</li>
                    </ul>
                    <p><strong>TRANSCRIPT FRAGMENT:</strong><br>Operator: "Hello?"<br>Response: "You already answered."</p>
                    <p><strong>RESULT:</strong><br>Four operators missing. No physical exit recorded.</p>
                    <div class="status-danger">STATUS: HUB DISCONNECTED FROM NATIONAL GRID</div>
                `,
        },
        "031": {
          title: "CASE 031 — “LAB LINK FAILURE”",
          content: `
                    <div class="metadata">TYPE: temporal data corruption / system recursion<br>ORIGIN: 1976 Research Facility Logs</div>
                    <p><strong>DESCRIPTION:</strong><br>All archived data reappeared modified in 1989 directory structure without external access.</p>
                    <p><strong>ANOMALY:</strong><br>A file not created in 1976 exists inside 1989 system root:</p>
                    <p><strong>FILE NAME:</strong><br>observer_return.log</p>
                    <p><strong>CONTENT:</strong><br>[DATA UNREADABLE]<br>[REPEATING PATTERN DETECTED]</p>
                    <p><strong>SYSTEM NOTE:</strong><br><span style="font-style:italic;">“The experiment did not end. It learned how to restart itself.”</span></p>
                    <div class="status-danger">STATUS: FILE SELF-PRESERVING</div>
                `,
        },
        "044": {
          title: "CASE 044 — “THE BLIND FILE”",
          content: `
                    <div class="metadata">TYPE: cognitive hazard / memory suppression event<br>ACCESS LEVEL: RESTRICTED</div>
                    <p><strong>DESCRIPTION:</strong><br>Any user attempting to open this file loses immediate recall of its contents within 24 hours.</p>
                    <p><strong>LOG ENTRY:</strong><br>User A → access granted → memory wipe<br>User B → access granted → denial of access event remembered incorrectly<br>User C → no recollection of ever accessing system</p>
                    <p><strong>SYSTEM BEHAVIOR:</strong><br>File appears differently each time it is opened.</p>
                    <p><strong>CURRENT CONTENT:</strong><br><span class="glitch-text-blue">“This file is not data. It is observation of the observer.”</span></p>
                    <div class="status-danger">STATUS: UNSTABLE / SELF-ERASING</div>
                `,
        },
        "058": {
          title: "CASE 058 — “SUBJECT NULL”",
          content: `
                    <div class="metadata">TYPE: non-localized entity / multi-point presence<br>CLASSIFICATION: Non-confirmed existence pattern</div>
                    <p><strong>OBSERVATIONS:</strong><br>Entity detected simultaneously across multiple surveillance feeds.</p>
                    <p><strong>PROPERTIES:</strong></p>
                    <ul>
                        <li>Appears in different locations at same timestamp</li>
                        <li>No consistent physical form</li>
                        <li>Recorded only in peripheral vision of cameras</li>
                    </ul>
                    <p><strong>CAMERA NOTES:</strong><br>Frame corruption increases when focused directly.</p>
                    <p><strong>RECORDED STATEMENT:</strong><br><span style="font-style:italic; font-weight:bold;">“You are not watching me. I am watching the moment you decide to look.”</span></p>
                    <div class="status-danger">STATUS: ACTIVE / UNCONTAINED</div>
                `,
        },
        "000": {
          title: "CLASSIFIED // OBSERVER SYSTEM",
          content: `
                    <div style="font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; font-weight: bold; color: #b30000; text-align: center; margin-top: 50px; line-height: 2.5;">
                        <p class="glitch-text-blue" style="color: #0b1e36;">YOU ARE LOOKING FOR SOMETHING.</p>
                        <p>WE ALREADY KNOW WHAT.</p>
                        <p>STOP SEARCHING.</p>
                        <p class="glitch-text-blue" style="color: #0b1e36;">OR CONTINUE HERE:</p>
                        <style>
                            .memorial-link:hover {
                                
                                transform: scale(1.1);
                            }
                        </style>
                        <a href="voss_memorial.html" class="memorial-link" style="color: #66b459; display: inline-block; margin-top: 30px; font-size: 1.5rem; transition: 0.3s;">/voss_memorial/</a>
                    </div>
                `,
        },
      };

      function openFile(id) {
        NexusSystem.playStatic(0.1);
        document
          .querySelectorAll(".file-link")
          .forEach((el) => el.classList.remove("active"));
        event.target.classList.add("active");

        const viewer = document.getElementById("doc-viewer");
        viewer.style.display = "block";
        viewer.style.opacity = "0";

        setTimeout(() => {
          document.getElementById("doc-title").innerText = files[id].title;
          document.getElementById("doc-content").innerHTML = files[id].content;
          viewer.style.opacity = "1";
          NexusSystem.playBeep(800, "square", 0.05, 0.1);
        }, 100);
      }
    </script>
  </body>
</html>
